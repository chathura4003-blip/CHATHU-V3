# Compose file for CHATHU MD — production-style local stack.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f bot
#   docker compose down
#
# The bot stores its WhatsApp session, downloads and db.json on a named
# volume so re-creating the container does NOT log you out.
#
# `redis` is bundled but optional — set CHATHU_RATE_LIMIT_BACKEND=redis to
# use it as the per-user rate-limit cache, otherwise the bot falls back to
# its in-process cache and the redis container is just idle.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: chathu-md:local
    container_name: chathu-md
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-changeme}
      JWT_SECRET: ${JWT_SECRET:-please-change-me-in-production}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OWNER_NUMBER: ${OWNER_NUMBER:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      OPENROUTER_API_KEYS: ${OPENROUTER_API_KEYS:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      CHATHU_RATE_LIMIT_BACKEND: ${CHATHU_RATE_LIMIT_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Redirect the JSON store into the chathu-db volume so re-creating
      # this container does not wipe users/groups/scheduler/broadcasts.
      DB_FILE: /app/db/db.json
    volumes:
      - chathu-data:/app/session
      - chathu-downloads:/app/downloads
      - chathu-db:/app/db
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/bot-api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: chathu-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - chathu-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  chathu-data:
  chathu-downloads:
  chathu-db:
  chathu-redis:
